<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Catálogo en la Nube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <!-- jQuery y jQuery Mobile -->
  <link rel="stylesheet" href="css/jquery.mobile.structure-1.4.5.min.css" />
  <link rel="stylesheet" href="css/themes/ByZCatalog.min.css" />
  <link rel="stylesheet" href="css/themes/jquery.mobile.icons.min.css" />

  <!-- Supabase con CDN alternativo -->
  <script src="js/supabase.min.js"></script>

  <script src="js/jquery-1.11.1.min.js"></script>
  <script src="js/jquery.mobile-1.4.5.min.js"></script>
  <link rel="stylesheet" href="css/app.css">
  <script src="js/app.js"></script>
</head>
<body>

<!-- Página de LOGIN -->
<div data-role="page" id="login" data-theme="a">
  <div data-role="header">
    <h1>Iniciar Sesión</h1>
  </div>
  <div data-role="content" style="text-align:center;">
    <img src="img/logo-wey.png" style="max-width:150px; margin:20px auto;">
    <form id="login-form">
      <label for="login-email">Email:</label>
      <input type="email" id="login-email" placeholder="tu@email.com" required>
      <label for="login-password">Contraseña:</label>
      <input type="password" id="login-password" placeholder="••••••••" required>
      <button type="submit" id="btn-login" class="ui-btn ui-btn-b ui-corner-all" style="margin-top:20px;">Ingresar</button>
    </form>
    <p>¿No tienes cuenta? <a href="#registro" class="ui-btn ui-btn-inline ui-mini">Regístrate</a></p>
    <div id="login-message" style="color:red; margin-top:10px;"></div>
  </div>
</div>

<!-- Página de REGISTRO -->
<div data-role="page" id="registro" data-theme="a">
  <div data-role="header">
    <a href="#login" data-role="button" data-icon="back">Atrás</a>
    <h1>Registro</h1>
  </div>
  <div data-role="content">
    <form id="registro-form">
      <label for="reg-email">Email:</label>
      <input type="email" id="reg-email" placeholder="tu@email.com" required>
      <label for="reg-password">Contraseña (mínimo 6 caracteres):</label>
      <input type="password" id="reg-password" placeholder="••••••••" required>
      <label for="reg-confirm">Confirmar contraseña:</label>
      <input type="password" id="reg-confirm" placeholder="••••••••" required>
      <button type="submit" id="btn-registro" class="ui-btn ui-btn-b ui-corner-all" style="margin-top:20px;">Crear cuenta</button>
    </form>
    <div id="registro-message" style="color:red; margin-top:10px;"></div>
  </div>
</div>

<!-- Página principal (catálogo) -->
<div data-role="page" id="catalogo">
  <div data-role="header" data-position="fixed" class="ui-header-custom" data-theme="a">
    <a href="#panel-categorias" data-role="button" data-icon="bars" data-iconpos="notext" data-theme="b"></a>
    <h1><span class="brand">Catálogo</span> <span class="year">2026</span></h1>
    <div data-role="controlgroup" data-type="horizontal" class="ui-btn-right">
      <a href="#" id="toggle-darkmode" data-role="button" data-icon="bullets" data-iconpos="notext" data-theme="b">🌙</a>
      <a href="#form-producto" data-role="button" data-icon="plus" data-iconpos="notext" data-theme="b">Agregar</a>
      <a href="#" id="btn-logout" data-role="button" data-icon="power" data-iconpos="notext" data-theme="b">Salir</a>
    </div>
  </div>

  <div data-role="content" data-theme="a">
    <input type="search" id="search-input" placeholder="Buscar producto...">
    <ul data-role="listview" id="lista-productos" data-enhanced="true"></ul>
  </div>

  <!-- Panel lateral de categorías -->
  <div data-role="panel" id="panel-categorias" data-display="overlay" data-position="left">
    <h2 data-theme="a" class="ui-bar ui-bar-a">Categorías</h2>
    <ul data-role="listview" id="lista-categorias" data-theme="a">
      <!-- Las categorías se cargarán dinámicamente -->
    </ul>
    <a href="#gestion-categorias" data-role="button" data-icon="edit" data-theme="b">Editar categorías</a>
  </div>

  <!-- Footer fijo -->
  <div data-role="footer" data-position="fixed" data-theme="a" class="ui-footer-custom">
    <div class="footer-content">
      <img src="img/logo-wey.png" alt="Wey & Asociados">
      | Hecho por ByZcode
    </div>
  </div>
</div>

<!-- Página de detalles -->
<div data-role="page" id="detalle" data-theme="a">
  <div data-role="header">
    <a href="#catalogo" data-role="button" data-icon="back">Atrás</a>
    <h1>Detalles</h1>
  </div>
  <div data-role="content" id="detalle-contenido"></div>
</div>

<!-- Página para agregar/editar producto -->
<div data-role="page" id="form-producto" data-theme="a">
  <div data-role="header">
    <a href="#" data-rel="back" data-role="button" data-icon="back">Cancelar</a>
    <h1>Producto</h1>
    <button type="button" id="guardar-producto" class="ui-btn ui-btn-b ui-corner-all" style="margin:0;">Guardar</button>
  </div>
  <div data-role="content">
    <form id="producto-form">
      <input type="hidden" id="edit-id" value="">
      <input type="hidden" id="edit-codigo" value="">
      
      <label for="codigo">Código:</label>
      <input type="text" id="codigo" placeholder="Ej: A026" required>
      
      <label for="nombre">Nombre:</label>
      <input type="text" id="nombre" placeholder="Ej: Inflable pack" required>
      
      <label for="categoria">Categoría:</label>
      <select id="categoria">
        <!-- Se llenará dinámicamente desde app.js -->
      </select>
      
      <label for="W">Ancho (W):</label>
      <input type="text" id="W" placeholder="Ej: 3 m" required>
      
      <label for="L">Largo (L):</label>
      <input type="text" id="L" placeholder="Ej: 8 m" required>
      
      <label for="H">Alto (H):</label>
      <input type="text" id="H" placeholder="Ej: 5 m" required>
      
      <label for="precio">Precio:</label>
      <input type="text" id="precio" placeholder="Ej: US$100" required>
      
      <label for="imagen">Imagen del producto:</label>
      <input type="file" id="imagen" accept="image/*" capture="environment">
      <div id="imagen-preview" style="margin:10px 0; text-align:center;">
        <img id="preview-img" src="#" alt="Vista previa" style="max-width:100%; max-height:200px; display:none; border:1px solid #ccc; border-radius:5px;">
      </div>
      <input type="hidden" id="imagen-base64" value="">
    </form>
  </div>
</div>

<!-- Página de gestión de categorías -->
<div data-role="page" id="gestion-categorias" data-theme="a">
  <div data-role="header">
    <a href="#" data-rel="back" data-role="button" data-icon="back">Atrás</a>
    <h1>Gestionar Categorías</h1>
    <a href="#" id="btn-nueva-categoria" data-role="button" data-icon="plus" data-iconpos="notext">Nueva</a>
  </div>
  <div data-role="content">
    <ul data-role="listview" id="lista-categorias-gestion" data-inset="true">
      <!-- Se llenará dinámicamente -->
    </ul>
    <!-- Formulario para nueva/editar categoría (oculto inicialmente) -->
    <div id="form-categoria-container" style="display:none;">
      <form id="form-categoria">
        <input type="hidden" id="edit-categoria-id" value="">
        <label for="nombre-categoria">Nombre de la categoría:</label>
        <input type="text" id="nombre-categoria" placeholder="Ej: Lácteos" required>
        <div class="ui-grid-a">
          <div class="ui-block-a"><button type="button" id="cancelar-categoria" class="ui-btn ui-btn-a">Cancelar</button></div>
          <div class="ui-block-b"><button type="submit" id="guardar-categoria" class="ui-btn ui-btn-b">Guardar</button></div>
        </div>
      </form>
    </div>
  </div>
</div>

</body>
</html>
